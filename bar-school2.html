const C={gold:"#d4a553",goldDim:"#7a5a20",goldBright:"#f0c070",surface:"rgba(16,8,2,0.97)",border:"#251505",borderLt:"#3a2008",text:"#e8d5a3",textDim:"#8a6a30",textFaint:"#3a2010",green:"#5db85d",greenBg:"rgba(25,80,25,0.35)",greenBd:"#3a7a3a",red:"#c85555",redBg:"rgba(90,20,20,0.35)",redBd:"#884040",blue:"#6090c0"};
const BG="radial-gradient(ellipse at 35% 20%, #1c0d02 0%, #080401 100%)";
const F="Georgia,serif";
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const uid=()=>Math.random().toString(36).slice(2,9);

async function searchDB(q){
  try{
    const r=await fetch("https://www.thecocktaildb.com/api/json/v1/1/search.php?s="+encodeURIComponent(q));
    const d=await r.json();
    if(!d.drinks)return[];
    return d.drinks.slice(0,20).map(drink=>{
      const ings=[];
      for(let i=1;i<=15;i++){const ing=drink["strIngredient"+i],meas=drink["strMeasure"+i];if(ing&&ing.trim())ings.push(meas?meas.trim()+" "+ing.trim():ing.trim());}
      return{id:"api_"+drink.idDrink,name:drink.strDrink,cat:"Searched",ingredients:ings,custom:true};
    });
  }catch{return[];}
}

const gradeIng=(ing,txt)=>{
  const kw=ing.toLowerCase().replace(/\d+(\.\d+)?(\s*oz|\s*ml)?/g,"").replace(/\b(fill|splash|top|garnish|optional|with|of|and|dash|dashes|barspoon|pinch|muddled|fresh|squeeze)\b/g," ").replace(/[():.,\/-]/g," ").trim().split(/\s+/).filter(w=>w.length>=3);
  return kw.length>0&&kw.some(k=>txt.toLowerCase().includes(k));
};

function Btn({children,onClick,v="primary",small,full,disabled}){
  const[h,setH]=useState(false);
  const styles={primary:{bg:h?"linear-gradient(135deg,#d4a553,#f0c070)":"linear-gradient(135deg,#7a5010,#d4a553)",color:"#080401",bd:"none"},secondary:{bg:h?"rgba(26,13,3,0.97)":"rgba(16,8,2,0.97)",color:C.gold,bd:"1px solid "+C.borderLt},danger:{bg:h?C.redBg:"transparent",color:C.red,bd:"1px solid "+(h?C.redBd:C.border)},ghost:{bg:"transparent",color:C.textDim,bd:"none"}};
  const s=styles[v]||styles.primary;
  return React.createElement("button",{onClick,disabled,onMouseEnter:()=>setH(true),onMouseLeave:()=>setH(false),style:{background:s.bg,color:s.color,border:s.bd,padding:small?"7px 16px":"11px 24px",fontSize:small?12:14,fontWeight:"bold",letterSpacing:1.5,textTransform:"uppercase",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,borderRadius:6,fontFamily:F,transition:"all 0.15s",width:full?"100%":undefined,boxShadow:h&&!disabled?"0 2px 18px rgba(212,165,83,0.3)":"none",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6}},children);
}

function PBar({val}){return <div style={{height:3,background:C.border}}><div style={{height:"100%",background:"linear-gradient(90deg,#6a4a08,#d4a553)",width:(val*100)+"%",transition:"width 0.4s ease"}}/></div>;}

function TopBar({title,onBack,right}){
  return <div style={{position:"sticky",top:0,background:"rgba(8,4,1,0.97)",backdropFilter:"blur(8px)",borderBottom:"1px solid "+C.border,padding:"13px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:20}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      {onBack&&<button onClick={onBack} style={{background:"none",border:"none",color:C.gold,fontSize:22,cursor:"pointer"}}>←</button>}
      <h2 style={{fontSize:14,color:C.gold,letterSpacing:2,textTransform:"uppercase",margin:0}}>{title}</h2>
    </div>
    {right}
  </div>;
}

function Badge({children,color}){color=color||C.gold;return <span style={{padding:"2px 9px",borderRadius:12,fontSize:11,fontWeight:"bold",letterSpacing:1,textTransform:"uppercase",background:color+"20",color,border:"1px solid "+color+"44"}}>{children}</span>;}

function Modal({title,onClose,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
    <div style={{background:"#0e0701",border:"1px solid "+C.borderLt,borderRadius:14,padding:24,maxWidth:500,width:"100%",maxHeight:"88vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h3 style={{color:C.gold,fontSize:14,letterSpacing:2,textTransform:"uppercase",margin:0}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.textDim,fontSize:24,cursor:"pointer"}}>x</button>
      </div>
      {children}
    </div>
  </div>;
}

function HomeScreen({tests,onNew,onPlay,onDelete}){
  const mc=m=>m==="flashcard"?C.blue:m==="written"?C.green:C.gold;
  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text,paddingBottom:60}}>
    <div style={{textAlign:"center",padding:"48px 20px 32px"}}>
      <div style={{fontSize:56,marginBottom:8,filter:"drop-shadow(0 0 28px rgba(212,165,83,0.5))"}}>🍸</div>
      <h1 style={{fontSize:34,color:C.gold,letterSpacing:5,textTransform:"uppercase",margin:"0 0 4px"}}>Bar School</h1>
      <p style={{fontSize:11,color:C.goldDim,letterSpacing:5,textTransform:"uppercase",margin:0}}>Bartender Study App</p>
      <p style={{fontSize:12,color:C.textFaint,marginTop:8}}>102 IBA Official Cocktails + 600+ searchable via TheCocktailDB</p>
    </div>
    <div style={{maxWidth:580,margin:"0 auto",padding:"0 18px"}}>
      <Btn onClick={onNew} full>+ Create New Test</Btn>
      {tests.length>0&&<div style={{marginTop:32}}>
        <p style={{fontSize:11,color:C.goldDim,letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>Saved Tests</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {tests.map(t=><div key={t.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"15px 17px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontSize:17,color:C.text,marginBottom:6}}>{t.name}</div>

function MCQuiz({drinks,allDrinks,onDone}){
  const[qs]=useState(()=>{
    const out=[];
    shuffle([...drinks]).forEach((drink,i)=>{
      if(i%2===0){
        const w=shuffle(allDrinks.filter(d=>d.id!==drink.id)).slice(0,3);
        out.push({type:"name",drink,prompt:"What cocktail has these ingredients?",choices:shuffle([drink.name,...w.map(d=>d.name)]),answer:drink.name});
      }else{
        const ci=drink.ingredients[Math.floor(Math.random()*drink.ingredients.length)];
        const pool=shuffle([...new Set(allDrinks.filter(d=>d.id!==drink.id).flatMap(d=>d.ingredients).filter(x=>!drink.ingredients.includes(x)))]).slice(0,3);
        if(pool.length<3){const w2=shuffle(allDrinks.filter(d=>d.id!==drink.id)).slice(0,3);out.push({type:"name",drink,prompt:"What cocktail has these ingredients?",choices:shuffle([drink.name,...w2.map(d=>d.name)]),answer:drink.name});}
        else out.push({type:"ingredient",drink,prompt:"Which ingredient belongs in a "+drink.name+"?",choices:shuffle([ci,...pool]),answer:ci});
      }
    });
    return out;
  });
  const[cur,setCur]=useState(0);
  const[sel,setSel]=useState(null);
  const[score,setScore]=useState(0);
  const[wrong,setWrong]=useState([]);
  const q=qs[cur];
  const pick=c=>{if(sel)return;setSel(c);if(c===q.answer)setScore(s=>s+1);else setWrong(w=>[...w,q]);};
  const next=()=>{if(cur+1>=qs.length)onDone({mode:"multiple-choice",score,total:qs.length,wrong});else{setCur(c=>c+1);setSel(null);}};
  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text}}>
    <TopBar title="Multiple Choice" right={<span style={{color:C.gold,fontSize:13,fontWeight:"bold"}}>Score: {score}</span>}/>
    <PBar val={cur/qs.length}/>
    <div style={{maxWidth:560,margin:"0 auto",padding:"20px 18px"}}>
      <div style={{fontSize:11,color:C.textDim,marginBottom:10,letterSpacing:1}}>Question {cur+1} of {qs.length}</div>
      <h2 style={{fontSize:17,color:C.text,marginBottom:16,lineHeight:1.4}}>{q.prompt}</h2>
      {q.type==="name"&&<div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"13px 15px",marginBottom:18}}>
        {q.drink.ingredients.map((ing,i)=><div key={i} style={{fontSize:13,color:C.textDim,padding:"5px 0",borderBottom:i<q.drink.ingredients.length-1?"1px solid "+C.border:"none"}}><span style={{color:C.textFaint,marginRight:8}}>▸</span>{ing}</div>)}
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:18}}>
        {q.choices.map((ch,i)=>{
          let bg=C.surface,bd="1px solid "+C.border,cl=C.text,glow="none";
          if(sel){if(ch===q.answer){bg=C.greenBg;bd="1px solid "+C.greenBd;cl=C.green;glow="0 0 10px rgba(50,140,50,0.2)";}else if(ch===sel){bg=C.redBg;bd="1px solid "+C.redBd;cl=C.red;}else{cl=C.textFaint;}}
          return <button key={i} onClick={()=>pick(ch)} style={{background:bg,border:bd,borderRadius:8,padding:"11px 13px",color:cl,cursor:sel?"default":"pointer",fontFamily:F,fontSize:13,textAlign:"left",lineHeight:1.4,transition:"all 0.15s",boxShadow:glow}}>
            <span style={{color:C.textFaint,marginRight:6,fontSize:11}}>{String.fromCharCode(65+i)}.</span>{ch}
          </button>;
        })}
      </div>
      {sel&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontSize:13,color:sel===q.answer?C.green:C.red,fontStyle:"italic"}}>{sel===q.answer?"Correct!":"Answer: "+q.answer}</div>
        <Btn small onClick={next}>{cur+1>=qs.length?"See Results":"Next →"}</Btn>
      </div>}
    </div>
  </div>;
}

function WrittenQuiz({drinks,onDone}){
  const[idx,setIdx]=useState(0);
  const[typed,setTyped]=useState("");
  const[submitted,setSubmitted]=useState(false);
  const[graded,setGraded]=useState(null);
  const running=useRef({correct:0,possible:0});
  const drink=drinks[idx];
  const submit=()=>{
    if(!typed.trim())return;
    const results=drink.ingredients.map(ing=>({ing,got:gradeIng(ing,typed)}));
    const correct=results.filter(r=>r.got).length;
    running.current.correct+=correct;running.current.possible+=drink.ingredients.length;
    setGraded({results,correct});setSubmitted(true);
  };
  const next=()=>{if(idx+1>=drinks.length)onDone({mode:"written",score:running.current.correct,total:running.current.possible});else{setIdx(i=>i+1);setTyped("");setSubmitted(false);setGraded(null);}};
  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text}}>
    <TopBar title="Written Quiz" right={<span style={{color:C.textDim,fontSize:12}}>{idx+1} / {drinks.length}</span>}/>
    <PBar val={idx/drinks.length}/>
    <div style={{maxWidth:540,margin:"0 auto",padding:"28px 18px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <p style={{fontSize:11,color:C.goldDim,letterSpacing:3,textTransform:"uppercase",marginBottom:7}}>What goes in a</p>
        <h2 style={{fontSize:28,color:C.gold}}>{drink.name}</h2>
      </div>
      {!submitted?<>
        <p style={{fontSize:11,color:C.textDim,marginBottom:8}}>Type all ingredients you remember — one per line</p>
        <textarea value={typed} onChange={e=>setTyped(e.target.value)} placeholder={"2oz Bourbon\n0.75oz Lime Juice\n..."} rows={7} style={{width:"100%",background:C.surface,border:"1px solid "+C.borderLt,borderRadius:8,padding:"12px 14px",color:C.text,fontFamily:F,fontSize:14,outline:"none",resize:"vertical",marginBottom:14,boxSizing:"border-box"}}/>
        <Btn onClick={submit} full disabled={!typed.trim()}>Submit Answer</Btn>
      </>:<>
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,overflow:"hidden",marginBottom:16}}>
          {graded.results.map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 15px",borderBottom:i<graded.results.length-1?"1px solid "+C.border:"none",background:r.got?C.greenBg:C.redBg}}>
            <span style={{color:r.got?C.green:C.red,flexShrink:0}}>{r.got?"✓":"✗"}</span>
            <span style={{fontSize:13,color:r.got?C.green:C.red}}>{r.ing}</span>
          </div>)}
        </div>
        <div style={{textAlign:"center",marginBottom:18,color:C.gold,fontSize:14}}>{graded.correct} / {drink.ingredients.length} ingredients recalled</div>
        <Btn onClick={next} full>{idx+1>=drinks.length?"See Results":"Next Drink →"}</Btn>
      </>}
    </div>
  </div>;
}

function ResultsScreen({results,onRetry,onHome}){
  const{mode,score,total,known,wrong}=results;
  const num=mode==="flashcard"?known:score;
  const pct=total>0?Math.round((num/total)*100):0;
  const g=pct>=90?{e:"🏆",m:"Outstanding!",c:"#ffd700"}:pct>=75?{e:"🍸",m:"Strong Work",c:"#c8c8c8"}:pct>=55?{e:"🥃",m:"Getting There",c:"#cd7f32"}:{e:"📚",m:"Keep Drilling",c:C.red};
  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text}}>
    <div style={{maxWidth:500,margin:"0 auto",padding:"52px 18px 20px",textAlign:"center"}}>
      <div style={{fontSize:54,marginBottom:10}}>{g.e}</div>
      <h1 style={{fontSize:22,color:C.gold,textTransform:"uppercase",letterSpacing:3,marginBottom:20}}>{mode==="flashcard"?"Study Complete":"Results"}</h1>
      <div style={{fontSize:64,fontWeight:"bold",color:g.c,lineHeight:1}}>{num}<span style={{fontSize:28,color:C.goldDim}}>/{total}</span></div>
      <div style={{fontSize:16,color:g.c,margin:"7px 0 3px"}}>{g.m}</div>
      <div style={{fontSize:13,color:C.goldDim,marginBottom:32}}>{pct}% {mode==="flashcard"?"known":"correct"}</div>
      {wrong&&wrong.length>0&&<div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"16px 18px",marginBottom:24,textAlign:"left",maxHeight:200,overflowY:"auto"}}>
        <p style={{color:C.red,fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Review These</p>
        {wrong.map((q,i)=><div key={i} style={{marginBottom:7,paddingBottom:7,borderBottom:i<wrong.length-1?"1px solid "+C.border:"none"}}>
          <div style={{fontSize:11,color:C.textDim,marginBottom:2}}>{q.prompt}</div>
          <div style={{fontSize:13,color:C.green}}>Answer: {q.answer}</div>
        </div>)}
      </div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Btn onClick={onRetry} full>Try Again</Btn>
        <Btn v="secondary" onClick={onHome} full>Home</Btn>
      </div>
    </div>
  </div>;
}

function App(){
  const[view,setView]=useState("home");
  const[custom,setCustom]=useState(()=>sget("bs_custom")||[]);
  const[tests,setTests]=useState(()=>sget("bs_tests")||[]);
  const[sel,setSel]=useState([]);
  const[active,setActive]=useState(null);
  const[results,setResults]=useState(null);
  const allDrinks=[...IBA,...custom];
  const saveTests=t=>{setTests(t);sset("bs_tests",t);};
  const saveCustom=c=>{setCustom(c);sset("bs_custom",c);};
  const toggle=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const startQuiz=t=>{setActive(t);setResults(null);setView("quiz");};
  const launchSaved=saved=>{const drinks=allDrinks.filter(d=>saved.drinkIds.includes(d.id));startQuiz({...saved,drinks});};
  if(view==="home")return <HomeScreen tests={tests} onNew={()=>{setSel([]);setView("library");}} onPlay={launchSaved} onDelete={id=>saveTests(tests.filter(t=>t.id!==id))}/>;
  if(view==="library")return <LibraryScreen allDrinks={allDrinks} selected={sel} onToggle={toggle} onAddCustom={d=>saveCustom([...custom,d])} onBuild={()=>setView("build")} onBack={()=>setView("home")}/>;
  if(view==="build")return <BuildScreen sel={sel} allDrinks={allDrinks} onRemove={id=>setSel(s=>s.filter(x=>x!==id))} onBack={()=>setView("library")} onSave={t=>{saveTests([...tests,t]);setView("home");}} onStart={t=>startQuiz({...t,drinks:allDrinks.filter(d=>sel.includes(d.id))})}/>;
  if(view==="quiz"&&active){
    const done=r=>{setResults(r);setView("results");};
    if(active.mode==="flashcard")return <FlashcardQuiz drinks={active.drinks} onDone={done}/>;
    if(active.mode==="written")return <WrittenQuiz drinks={active.drinks} onDone={done}/>;
    return <MCQuiz drinks={active.drinks} allDrinks={allDrinks} onDone={done}/>;
  }
  if(view==="results")return <ResultsScreen results={results} onRetry={()=>startQuiz(active)} onHome={()=>setView("home")}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
