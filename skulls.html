// ── UTILS ────────────────────────────────────────────────────────
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

// Levenshtein distance for fuzzy matching
function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

// Extract amount from ingredient string e.g. "2oz" "0.75oz" "1 Dash"
function extractAmount(str){
  const m=str.match(/^(\d+(\.\d+)?)\s*(oz|dash|dashes|tsp|tbsp|splash|fill|top|garnish)/i);
  return m?m[1]:null;
}

// Check if typed text matches an ingredient with leniency
// Amount must be correct, ingredient name can be fuzzy matched
function gradeIngredient(ingredient, typed){
  const ingLower = ingredient.toLowerCase();
  const typedLower = typed.toLowerCase();

  // Special cases: garnish/top/fill/splash lines — just check keyword presence
  if(/^(garnish|top|fill|splash|egg)/i.test(ingredient)){
    const key = ingLower.replace(/^(garnish:|top with|fill with|splash of)/i,'').trim().split(/\s+/)[0];
    return typedLower.includes(key.slice(0,4));
  }

  // Extract amount from ingredient
  const reqAmount = extractAmount(ingredient);

  // Extract ingredient name (everything after the amount)
  const ingName = ingredient.replace(/^\d+(\.\d+)?\s*(oz|dash(es)?|tsp|tbsp|barspoon)\s*/i,'').toLowerCase().trim();

  // Check amount match (must be present if specified)
  let amountOk = true;
  if(reqAmount){
    // Look for the number in typed text
    const nums = typedLower.match(/\d+(\.\d+)?/g)||[];
    amountOk = nums.some(n => Math.abs(parseFloat(n)-parseFloat(reqAmount)) < 0.05);
  }

  if(!amountOk) return false;

  // Fuzzy check ingredient name — split into keywords
  const keywords = ingName.split(/[\s,\/]+/).filter(w=>w.length>=3);
  if(keywords.length===0) return false;

  // Check if at least half the keywords are present (with some fuzziness)
  const lines = typedLower.split(/[\n,]+/);
  let matched = 0;
  for(const kw of keywords){
    // Check across all typed lines for fuzzy match
    const found = lines.some(line=>{
      const words = line.split(/\s+/);
      return words.some(w => {
        if(w.includes(kw.slice(0,4))) return true; // prefix match
        if(kw.length<=5) return levenshtein(w,kw)<=1;
        return levenshtein(w,kw)<=2;
      });
    });
    if(found) matched++;
  }
  return matched >= Math.ceil(keywords.length * 0.6);
}

// Grade entire written answer against a drink
function gradeAnswer(drink, typed){
  return drink.ingredients.map(ing=>({ing, got:gradeIngredient(ing, typed)}));
}

// ── ATOMS ─────────────────────────────────────────────────────────
function Btn({children,onClick,v="primary",small,full,disabled}){
  const[h,setH]=useState(false);
  const styles={
    primary:{bg:h?"linear-gradient(135deg,#e03030,#ff6060)":"linear-gradient(135deg,#6a0a0a,#c02020)",color:"#fff",bd:"none"},
    secondary:{bg:h?C.surfaceHov:C.surface,color:C.primary,bd:"1px solid "+(h?C.primaryDim:C.borderLt)},
    danger:{bg:h?C.redBg:"transparent",color:C.red,bd:"1px solid "+(h?C.redBd:C.border)},
    ghost:{bg:"transparent",color:C.textDim,bd:"none"},
  };
  const s=styles[v]||styles.primary;
  return <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{background:s.bg,color:s.color,border:s.bd,padding:small?"7px 16px":"11px 26px",fontSize:small?12:14,fontWeight:"bold",letterSpacing:2,textTransform:"uppercase",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,borderRadius:4,fontFamily:F,transition:"all 0.15s",width:full?"100%":undefined,boxShadow:h&&!disabled?"0 2px 20px rgba(200,30,30,0.4)":"none",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6}}>
    {children}
  </button>;
}

function PBar({val}){
  return <div style={{height:3,background:C.border}}>
    <div style={{height:"100%",background:"linear-gradient(90deg,#6a0a0a,#e03030)",width:(val*100)+"%",transition:"width 0.4s ease"}}/>
  </div>;
}

function TopBar({title,onBack,right}){
  return <div style={{position:"sticky",top:0,background:"rgba(10,10,10,0.97)",backdropFilter:"blur(8px)",borderBottom:"1px solid "+C.border,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:20}}>

      <h2 style={{fontSize:14,color:C.primary,letterSpacing:3,textTransform:"uppercase",margin:0}}>{title}</h2>
    </div>

}

// ── MULTIPLE CHOICE ───────────────────────────────────────────────
function MCQuiz({onDone}){
  const NCHOICES=10;
  const[qs]=useState(()=>{
    const out=[];
    shuffle([...DRINKS]).forEach((drink,i)=>{
      if(i%2===0){
        // Name the drink from ingredients
        const wrongs=shuffle(DRINKS.filter(d=>d.id!==drink.id)).slice(0,NCHOICES-1);
        out.push({type:"name",drink,prompt:"Which cocktail has these ingredients?",choices:shuffle([drink.name,...wrongs.map(d=>d.name)]),answer:drink.name});
      } else {
        // Pick the correct ingredient
        const ci=drink.ingredients[Math.floor(Math.random()*drink.ingredients.length)];
        const allIngs=[...new Set(DRINKS.filter(d=>d.id!==drink.id).flatMap(d=>d.ingredients).filter(x=>!drink.ingredients.includes(x)))];
        const pool=shuffle(allIngs).slice(0,NCHOICES-1);
        if(pool.length<NCHOICES-1){
          const w2=shuffle(DRINKS.filter(d=>d.id!==drink.id)).slice(0,NCHOICES-1);
          out.push({type:"name",drink,prompt:"Which cocktail has these ingredients?",choices:shuffle([drink.name,...w2.map(d=>d.name)]),answer:drink.name});
        } else {
          out.push({type:"ingredient",drink,prompt:"Which ingredient belongs in a "+drink.name+"?",choices:shuffle([ci,...pool]),answer:ci});
        }
      }
    });
    return out;
  });
  const[cur,setCur]=useState(0);
  const[sel,setSel]=useState(null);
  const[score,setScore]=useState(0);
  const[wrong,setWrong]=useState([]);
  const q=qs[cur];
  const pick=c=>{if(sel)return;setSel(c);if(c===q.answer)setScore(s=>s+1);else setWrong(w=>[...w,q]);};
  const next=()=>{if(cur+1>=qs.length)onDone({mode:"multiple-choice",score,total:qs.length,wrong});else{setCur(c=>c+1);setSel(null);}};

  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text}}>
    <TopBar title="Multiple Choice" right={<span style={{color:C.primary,fontSize:13,fontWeight:"bold"}}>💀 {score}</span>}/>
    <PBar val={cur/qs.length}/>
    <div style={{maxWidth:620,margin:"0 auto",padding:"20px 18px"}}>
      <div style={{fontSize:11,color:C.textDim,marginBottom:10,letterSpacing:2}}>Question {cur+1} of {qs.length}</div>
      <h2 style={{fontSize:16,color:C.text,marginBottom:16,lineHeight:1.5}}>{q.prompt}</h2>
      {q.type==="name"&&<div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:"13px 16px",marginBottom:18}}>
        {q.drink.ingredients.map((ing,i)=><div key={i} style={{fontSize:13,color:C.textDim,padding:"5px 0",borderBottom:i<q.drink.ingredients.length-1?"1px solid "+C.border:"none"}}>
          <span style={{color:C.textFaint,marginRight:8}}>▸</span>{ing}
        </div>)}
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
        {q.choices.map((ch,i)=>{
          let bg=C.surface,bd="1px solid "+C.border,cl=C.text,glow="none";
          if(sel){
            if(ch===q.answer){bg=C.greenBg;bd="1px solid "+C.greenBd;cl=C.green;glow="0 0 8px rgba(50,140,50,0.25)";}
            else if(ch===sel){bg=C.redBg;bd="1px solid "+C.redBd;cl=C.red;}
            else{cl=C.textFaint;}
          }
          return <button key={i} onClick={()=>pick(ch)} style={{background:bg,border:bd,borderRadius:6,padding:"10px 12px",color:cl,cursor:sel?"default":"pointer",fontFamily:F,fontSize:12,textAlign:"left",lineHeight:1.4,transition:"all 0.15s",boxShadow:glow}}>
            <span style={{color:C.textFaint,marginRight:6,fontSize:10}}>{String.fromCharCode(65+i)}.</span>{ch}
          </button>;
        })}
      </div>
      {sel&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:13,color:sel===q.answer?C.green:C.red,fontStyle:"italic"}}>
          {sel===q.answer?"✓ Correct!":"✗ "+q.answer}
        </div>
        <Btn small onClick={next}>{cur+1>=qs.length?"See Results":"Next →"}</Btn>
      </div>}
    </div>
  </div>;
}

// ── FLASHCARD ─────────────────────────────────────────────────────
function FlashcardQuiz({onDone}){
  const drinks=shuffle([...DRINKS]);
  const[idx,setIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const known=useRef(0);
  const drink=drinks[idx];
  const mark=k=>{
    if(k)known.current++;
    if(idx+1>=drinks.length)onDone({mode:"flashcard",known:known.current,total:drinks.length});
    else{setIdx(i=>i+1);setFlipped(false);}
  };
  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text}}>
    <TopBar title="Flashcards" right={<span style={{color:C.textDim,fontSize:12}}>{idx+1} / {drinks.length}</span>}/>
    <PBar val={idx/drinks.length}/>
    <div style={{maxWidth:540,margin:"0 auto",padding:"32px 18px"}}>
      <div onClick={()=>setFlipped(f=>!f)}
        style={{background:C.surface,border:"1px solid "+(flipped?C.primary:C.border),borderRadius:14,padding:"44px 28px",minHeight:280,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",marginBottom:22,transition:"all 0.2s",boxShadow:flipped?"0 0 40px rgba(200,30,30,0.12)":"none"}}>
        {!flipped?<>
          <div style={{fontSize:10,color:C.primaryDim,letterSpacing:4,textTransform:"uppercase",marginBottom:18}}>Drink Name</div>
          <div style={{fontSize:30,color:C.primary,fontWeight:"bold",letterSpacing:2}}>{drink.name}</div>
          <div style={{fontSize:10,color:C.textFaint,marginTop:24,letterSpacing:2}}>TAP TO REVEAL RECIPE</div>
        </>:<>
          <div style={{fontSize:10,color:C.primaryDim,letterSpacing:4,textTransform:"uppercase",marginBottom:18}}>{drink.name}</div>
          {drink.ingredients.map((ing,i)=><div key={i} style={{fontSize:14,color:C.text,padding:"7px 0",borderBottom:i<drink.ingredients.length-1?"1px solid "+C.border:"none",width:"100%",textAlign:"left"}}>
            <span style={{color:C.primaryDim,marginRight:10}}>▸</span>{ing}
          </div>)}
        </>}
      </div>
      {flipped&&<div style={{display:"flex",gap:12}}>
        <Btn v="danger" full onClick={()=>mark(false)}>✗ Still Learning</Btn>
        <Btn full onClick={()=>mark(true)}>✓ Got It!</Btn>
      </div>}
      {!flipped&&<div style={{textAlign:"center",color:C.textFaint,fontSize:11,letterSpacing:2}}>{DRINKS.length-idx-1} drinks remaining</div>}
    </div>
  </div>;
}

// ── WRITTEN ───────────────────────────────────────────────────────
function WrittenQuiz({onDone}){
  const drinks=shuffle([...DRINKS]);
  const[idx,setIdx]=useState(0);
  const[typed,setTyped]=useState("");
  const[submitted,setSubmitted]=useState(false);
  const[graded,setGraded]=useState(null);
  const running=useRef({correct:0,possible:0});
  const drink=drinks[idx];

  const submit=()=>{
    if(!typed.trim())return;
    const results=gradeAnswer(drink,typed);
    const correct=results.filter(r=>r.got).length;
    running.current.correct+=correct;
    running.current.possible+=drink.ingredients.length;
    setGraded({results,correct});
    setSubmitted(true);
  };

  const next=()=>{
    if(idx+1>=drinks.length)onDone({mode:"written",score:running.current.correct,total:running.current.possible});
    else{setIdx(i=>i+1);setTyped("");setSubmitted(false);setGraded(null);}
  };

  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text}}>
    <TopBar title="Written Quiz" right={<span style={{color:C.textDim,fontSize:12}}>{idx+1} / {drinks.length}</span>}/>
    <PBar val={idx/drinks.length}/>
    <div style={{maxWidth:540,margin:"0 auto",padding:"32px 18px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <p style={{fontSize:10,color:C.primaryDim,letterSpacing:4,textTransform:"uppercase",marginBottom:10}}>What goes in a</p>
        <h2 style={{fontSize:30,color:C.primary,letterSpacing:2}}>{drink.name}</h2>
        <p style={{fontSize:11,color:C.textFaint,marginTop:8}}>{drink.ingredients.length} ingredients · amounts count · spelling is forgiving</p>
      </div>

      {!submitted?<>
        <textarea value={typed} onChange={e=>setTyped(e.target.value)}
          placeholder={"2oz Bourbon\n0.75oz Lime Juice\nDash Simple Syrup\n..."}
          rows={8}
          style={{width:"100%",background:C.surface,border:"1px solid "+C.borderLt,borderRadius:8,padding:"13px 15px",color:C.text,fontFamily:F,fontSize:13,outline:"none",resize:"vertical",marginBottom:14,boxSizing:"border-box",lineHeight:1.8}}/>
        <Btn onClick={submit} full disabled={!typed.trim()}>Submit Answer</Btn>
      </>:<>
        <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,overflow:"hidden",marginBottom:16}}>
          {graded.results.map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<graded.results.length-1?"1px solid "+C.border:"none",background:r.got?C.greenBg:C.redBg}}>
            <span style={{color:r.got?C.green:C.red,fontSize:16,flexShrink:0}}>{r.got?"✓":"✗"}</span>
            <span style={{fontSize:13,color:r.got?C.green:C.red}}>{r.ing}</span>
          </div>)}
        </div>
        <div style={{textAlign:"center",marginBottom:18}}>
          <span style={{fontSize:20,color:C.primary,fontWeight:"bold"}}>{graded.correct}</span>
          <span style={{fontSize:14,color:C.textDim}}>/{drink.ingredients.length} ingredients recalled</span>
        </div>
        <Btn onClick={next} full>{idx+1>=drinks.length?"See Results":"Next Drink →"}</Btn>
      </>}
    </div>
  </div>;
}

// ── RESULTS ───────────────────────────────────────────────────────
function ResultsScreen({results,onRetry,onHome}){
  const{mode,score,total,known,wrong}=results;
  const num=mode==="flashcard"?known:score;
  const pct=total>0?Math.round((num/total)*100):0;
  const g=pct>=90?{e:"💀",m:"SKULL MASTER",c:"#ff3030"}:
          pct>=75?{e:"🔥",m:"CRUSHING IT",c:"#ff8c00"}:
          pct>=55?{e:"⚡",m:"GETTING THERE",c:"#d4a553"}:
          {e:"📖",m:"STUDY MORE",c:"#888"};
  return <div style={{minHeight:"100vh",background:BG,fontFamily:F,color:C.text}}>
    <div style={{maxWidth:500,margin:"0 auto",padding:"52px 18px 20px",textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:12,filter:"drop-shadow(0 0 30px rgba(200,30,30,0.5))"}}>{g.e}</div>
      <h1 style={{fontSize:20,color:C.primary,textTransform:"uppercase",letterSpacing:4,marginBottom:22}}>
        {mode==="flashcard"?"Study Complete":"Results"}
      </h1>
      <div style={{fontSize:72,fontWeight:"bold",color:g.c,lineHeight:1}}>
        {num}<span style={{fontSize:30,color:C.textDim}}>/{total}</span>
      </div>
      <div style={{fontSize:16,color:g.c,margin:"8px 0 4px",letterSpacing:2}}>{g.m}</div>
      <div style={{fontSize:13,color:C.textDim,marginBottom:32}}>{pct}% {mode==="flashcard"?"known":"correct"}</div>

      {wrong&&wrong.length>0&&<div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"16px 18px",marginBottom:24,textAlign:"left",maxHeight:220,overflowY:"auto"}}>
        <p style={{color:C.red,fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>⚠ Review These</p>
        {wrong.map((q,i)=><div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:i<wrong.length-1?"1px solid "+C.border:"none"}}>
          <div style={{fontSize:11,color:C.textDim,marginBottom:3}}>{q.prompt}</div>
          <div style={{fontSize:13,color:C.green}}>→ {q.answer}</div>
        </div>)}
      </div>}

      {pct>=80&&<div style={{background:"rgba(200,30,30,0.08)",border:"1px solid "+C.primaryDim,borderRadius:8,padding:"14px 18px",marginBottom:24,fontSize:13,color:C.textDim,lineHeight:1.7}}>
        🍸 Quiz is tomorrow. You're ready.
      </div>}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Btn onClick={onRetry} full>↺ Try Again</Btn>
        <Btn v="secondary" onClick={onHome} full>⌂ Home</Btn>
      </div>
    </div>
  </div>;
}

// ── ROOT ──────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("home");
  const[mode,setMode]=useState(null);
  const[results,setResults]=useState(null);

  const start=m=>{setMode(m);setResults(null);setScreen("quiz");};
  const done=r=>{setResults(r);setScreen("results");};

  if(screen==="home") return <HomeScreen onStart={start}/>;
  if(screen==="quiz"){
    if(mode==="flashcard") return <FlashcardQuiz onDone={done}/>;
    if(mode==="written")   return <WrittenQuiz   onDone={done}/>;
    return <MCQuiz onDone={done}/>;
  }
  if(screen==="results") return <ResultsScreen results={results} onRetry={()=>start(mode)} onHome={()=>setScreen("home")}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
